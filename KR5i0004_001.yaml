front:
  text: 元始上帝毗盧遮耶説大洞救劫尊經重刋道藏輯要元始上帝毗盧遮耶説大洞救劫尊經
  hash: sha256:6d38dc81541f3a1f9e27604d756f88b1e637f79b7cbb2c5c329669f1383ed63f
  markers:
  - {type: page-break, offset: 15, content: '', id: CK-KZ_KR5i0004_01p056a}
body:
  text: 大洞救輪回劫第一章爾時元始天寶至尊在鬱羅蕭臺之中登紫極瓊霄之殿諸天環拱萬聖侍班至尊放大威光一時在側者乘斯慧照無弗洞見塵劫未敢議問至尊喟然歎曰塵劫纍纍鮮能超脫茫茫重重實可憫傷至尊正在浩歎時有夜光玉女越班長跪請曰至尊所憫是何劫數天寶謂曰以汝日侍御筵得離業海而初入聖流未識塵波倘能照悉劫數無限煩惱苦楚憂悲汝當慶幸無已離脫塵劫正非偶也汝其乘吾光登琉璃臺而一照之維時夜光玉女承諭踴躍登臺照見天堂之下有八人載於車軸分立八方其軸不疾不徐旋轉不息而立軸上者隨之旋轉夜光玉女注視久之未明其故隨詣天寶几前俯伏奏曰賤臣奉命登臺照見八人共軸往來轉換此何故也至尊曰劫也曰何劫至尊曰此輪回劫塵凡之第一劫也其劫輪轉而不克息象有若車軸然而所立之八人者貧賤富貴夀夭勞逸塵凡於此盡之輪回即於此轉之夜光聞是語已頓得開悟又復稽首請曰敢問此劫可以救否至尊曰可哉吾當遍敕諸仙開科闡教喚醒羣迷使不昧者葆護靈根得躋仙路便可脫此一劫夜光謝曰倘得聖慈超提覺路真聖德也神功也於是至尊隨演大洞章曰溟濛誠何極昏昏亦昭昭貪愛苦沉溺翹陽棄苦匏生生還滅滅脫脫自陶陶環顧諸在列功德匪一朝乃無生滅事蓮花任逍遙至尊既説洞章已又宣祕咒曰嘟嚕嘟嚕吽吽唎脫塵苦脫塵苦咿咿嗄嗄囉婆祖囉婆祖唵吽吽唎大洞救旃檀劫第二章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而再照之夜光承諭又復登臺照見一門有若城闉童男童女更互出入往來絡繹不絶神官鬼役驅之率之夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見童男童女出入城闉絡繹不絶此何故也至尊曰劫也曰何劫至尊曰此旃檀劫也人生塵土造作不善千愆萬過報對難銷將入畜生先作化生周歲而亡三六九歲而亡十二五歲而亡痘傷疹傷驚癎雜病更有才見天日及未見天日而亡者一日一夜萬死萬生是皆旃檀神君主之夜光請曰敢問此劫可以救否至尊曰可哉吾當敕長生大帝研蟠桃露遍滴人間錫以長齡脫郤短折於是至尊隨演大洞章曰幻哉彼浮漚咄兮此泡影蜉蝣並其生大微嘯長嶺一劒回黃旗百族如驂靷羣躋混元臺離合何相引熙熙養嬰童綿綿自我柄至尊既説洞章已又宣祕咒曰陀羅陀羅優婆囉嗒哩吽演幢挪婆囉婆囉解羣魔婆訶恆沙訶大洞救殺劫第三章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見黑霧漫漫陰風曀曀中有靑面如靛之人赤髮倒生橫走不依塗徑手執一銶所向方處不見人煙惟聞松聲鶴唳狐嘯猿啼夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見黑霧陰風中有梟神橫衝人煙不見此何故也至尊曰劫也曰何劫至尊曰此殺劫也殺劫三百年而一周天魔三十世而一降塵凡不忠君王不孝父母驕縱淫佚詭詐姦欺上干天怒下拂人情遂有魔王乘會殄滅凶頑爭地則殺人滿地爭城則殺人盈城到處胥靡屠割殆盡諸塵劫中惟此最慘夜光請曰敢問此劫可以救否至尊曰可哉吾當敕太一慈尊持如意寶帥靑獅下界收攝魔精廓淸海甸於是至尊隨演大洞章曰海宇重淸寧神幡攝凶暴混沌本太虛頤和任長嘯勢極一回風八方俱震悼本無妖孽興妖孽人所造離馬合東南六一加一告至尊既説洞章已又宣祕咒曰唏哩唏哩不作難難自已唵吽吽唎嘛吱耶嘛迦耶㗭得㗭得隨吾敕大洞救水劫第四章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見大地之中青氣浮空白練遍野中有怪物似龍非龍似蛟非蛟半若人形半若豕狀東蕩西竄穿巖撞壁山嶽為之震撼風雨從之肆狂夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見白練靑氣昏冥莫辨光輝怪物猙獰怒號排蕩此何故也至尊曰劫也曰何劫也至尊曰此水劫也水能生物亦能殺物運百二十年為一度水六十六年見一災每當劫會之期水母因之肆虐衆壑之注湧從百川之流依附有如江漢之朝宗不聽河海之振泄洶洶混混傾阜漫山不獨田廬汨沒而當境男女老少纜結繩牽飄蕩如萍流尸遍地六畜隨之夜光請曰敢問此劫可以救否至尊曰可哉吾當敕洞陰水官收伏水怪淸釐衆流奠定狂瀾安鎮當境於是至尊隨演大洞章曰天一生何意周流灌太虛恬淡原非惡安瀾晏民居大周天地外小沃巽離閭北都聽誥命析旦敢越踰揮霍返澄渟波靜不揚噓至尊既説洞章已又宣祕咒曰呾陀呾陀恆沙河不作魔哆囉吽叱囉哆囉吽叱囉唵吽吒吽吒唎大洞救火劫第五章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見下界之中赤鼠遊城飛鈴振響紅焰騰騰山川閃閃內有赤毬動蕩四方人民悚懾雞犬惶怖東西下遺如日如星難嚮難執夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見赤毬赤鼠鼓動飛揚炎炎勢不可撲赫赫威不可當人民顚倒呼籲聲聞此何故也至尊曰劫也曰何劫至尊曰此火劫也鶉枵之次舍照臨乎分野其回祿之神按罪施罰分疆定界樹其赤幟煽焰而爇之一任連牆接屋比閭而居寺觀塔樓千霄而峙霎刻之間洞爇平壤牛羊雞狗隨人均罹於殃夜光請曰敢問此劫可以救否至尊曰可哉吾當敕昌陽梵寶管攝火魔收束火怪毋或燎原毋或肆害甘露零零執法不貸惠此中國以安四大於是至尊隨演大洞章曰三氣勃發光威靈不可助返雨共回風遍灑淸涼露祝融憫苦哀龍神歸舊處千妖並萬姦斂約從吾步一派淸涼場不熖光明路至尊既説洞章已又宣祕咒曰薩縳薩縳光明塔不能煞呼唎呼唎哩呼陀呼唎哩唵嗎唎嗎唎安神契唏唎阿陀唎大洞救瘟劫第六章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見大樹蟠曲有若華蓋下置一盂中注緑水繞盂之外無數鬼役挈壺提甕傾盆注斗去來不息夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見樹下置盂盂注緑水鬼役酌挹往來有如搬運此何故也至尊曰劫也曰何劫至尊曰此瘟劫也年不順成飢饉洊臻或亢陽而流虐或霪陰而肆害愆伏之氣積為癘疫下民善不足以格天過多有以招戾乃丁其會遂罹其殃由一人而延及千萬人由一家而延及千萬家毒癘腥聞更遍六畜無所逃匿良可哀憫夜光請曰敢問此劫可以救否至尊曰可哉吾當敕旻天神王揮寶劒以除氛驅瘟鬼而退舍一洗災迍之氣提登仁夀之臺於是至尊隨演大洞章曰熙然遊皇野掃蕩命靈氛瑞氣結萬重靄靄下紫雲大丹握手中散布成五雯明道輝光動空洞相與親上中及下界瞻仰若經綸至尊既説洞章已又宣祕咒曰蘇屠蘇屠伐昆吾袪籧篨咿唔嘛唎唔哆囉哆囉薩哩呵哆囉哆囉娑唎訶哆囉哆囉木伽訶大洞救雷劫第七章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見赤繩閃閃椎鼓殷殷旗旙列乎八方車軸散於九地無數男女六畜各插一幟戰兢惶怖夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見赤繩椎鼓無數旗旙人物處其下背各插幟昏迷如醉目瞪如癡髮毛盡落體無完膚此何故也至尊曰劫也曰何劫至尊曰此雷劫也國有國罰天有天罰逃於國罰者必難逃於天罰凡前生不忠不孝犯五逆十惡者不罹憲網天必殛之任王侯將相法所不貰此等人物緣有前愆是不克免夜光請曰敢問此劫可以救否至尊曰可哉吾當敕九天雷祖出智慧力本淸淨心宏廣大願與雷師皓翁宣玉樞祕密濟凡民厄難使五方使者八方使者各各聽命同發慈悲於是至尊隨演大洞章曰闔闢分門戶陰陽氣象交木郎不追捕土母亦無撓惟見山川靜無煩龍虎跑永鎮元風遍常見玉燭調鼓蕩任安驅慧海絶狂濤至尊既説洞章已又宣祕咒曰婆彌婆彌薩菩提唏哩咦唏哩咦唵吽叱吽叱菩提唏咦唏咦謁諦大洞救風劫第八章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見兩石對峙中各有穴青黑之氣自穴內焰焰上騰八方羅列旌旗飄颻震蕩蛟龍見於其中虎豹伏於其內一方振響人物披靡夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見石穴對峙厲氣湧出人物為之不寧八方為之震動此何故也至尊曰劫也曰何劫至尊曰此風劫也風調則祥風愆則厲箕宿主之風師帥之天地之間有兩大谷輪轉出風風和則人物賴之以安風暴則人物遂受其賊所向各有方隅其來不可測度總緣世途嶮巇果行淺薄善不足以格天身自有以招劫宮室臺榭一時可空共井同川一朝可盡舟航翻覆車馬掀折無限性命莫知所極夜光請曰敢問此劫可以救否至尊曰可哉吾當敕梓潼元皇以文昌筆南斗魁鎮之龍不許從以吟虎不許從以嘯少女安靜於林箕宿好生於舍條無所鳴塵無所苦於是至尊隨演大洞章曰呵呬原有主噓呼自向方九轉泯輪廓七制任金剛和扇原棣棣天蓋乃堂堂運會無僭忒馳驛終周行止蛟制虬龍部署恆有常至尊既説洞章已又宣祕咒曰蒲盧蒲盧不張弧自納壺唵嗎哩婆圖葛辣葛辣蘇唵吽吽謨大洞救雹劫第九章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見村墟之所崚嶒大塊有如白石雷電繞之騰騰上起散漫四布其地人民多被摧折六畜咸受毁傷凡一切動植飛潛之屬亦遭損壞夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見似石非石崚嶒怪塊大如磨蓋長若碓挺小則如盆如碗紛紛落落蟬聯直下風雨雷電贊助其威現在人物無不俱斃此何故也至尊曰劫也曰何劫至尊曰此雹劫也雹積北陸之壘厯千百年重陰凝結塵凡造作不善者類聚而居湊集一方之上天降大罰則起北陸之冰化而成雹當其衝者人物五穀一時毁盡於雷較烈夜光請曰敢問此劫可以救否至尊曰可哉吾當敕玉虛真武建七星旗率坎離將掃蕩災魔民物安堵於是至尊隨演大洞章曰重陰塞其戶雙扉允不門井故道非常經那剎拒往來下無精魅引上有昭明臺回靈運真氣雙皇夾太微惟見淸涼露霏霏降玉階至尊既説洞章已又宣祕咒曰怛陀怛陀恆沙河郤災魔唵叭唎吽摩娑吽口曩謨吧哩吽口曩謨吧哩吽大洞救陷劫第十章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見坦平陸地城郭宮室煙火萬家人物稠密風景美好忽然地裂數丈周圍陷突一時所見景色不知消歸何處惟見巨坑深潭漫漫白浪滚滚洪流夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見地廣人稠宮室城郭無端突陷蹤迹不知陸變為水城易為池附近岡阜亦無全形此何故也至尊曰劫也曰何劫至尊曰此陷劫也地下皆水土覆其上總恃一寧之氣凝聚包羅三百年一寧之氣充周未滿則凡不固之區必見下陷而當此一方者厄會適逢遂遭汨沒夜光請曰敢問此劫可以救否至尊曰可哉吾當敕清虛地官運化七氣提拔三塗永使地柱常撑鰲頭不動五嶽安鎮四維坦平於是至尊隨演大洞章曰坤母覆上玄西北門多固碧霞耀光生照臨何岐路鎮奠溥含靈鯨鰲少回顧上下其奠安本是歸元處元君扇和風遍滿香花露至尊既説洞章已又宣祕咒曰阿哪阿哪粹呮哆沙縛賀哆囉哆囉婆俞納囉唵吽吒吽吒修圖河哆囉哆囉吽吽吽大洞救坑劫第十一章至尊咒畢旋喚夜光玉女曰汝巳識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見兩人一黑面紅髮一靑面紅髮左執戈戟右執鞭弭將無數兵民驅掩如逐衆獸落於坑坎上以土封為邱有似京觀夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見靑黑巨人持戈執鞭驅率兵民盡落坎窞不可數紀惟聞𡨚號此何故也至尊曰劫也曰何劫至尊曰此坑劫也天魔當路屠戮會逢乃或厭殺以污鋒刃遂於屠割之外另闢陷阱或以術誘或以勢驅其時兵民命數將盡遂落圈套俱被陷坑雖獲全軀實為活斃夜光請曰敢問此劫可以救否至尊曰可哉吾當敕圓通自在以楊枝水灌𡨚結地使被掩者超出泥塗往來樂境於是至尊隨演大洞章曰混魔返故宮百族上朱陵慈悲開法界橫惡難準行本在空洞中樂趣自堪尋銜結終成結解網洽其情大法原流轉飄逸任上升至尊既説洞章已又宣祕咒曰喃陀喃陀無央界桑土阿修圖唎修圖囉摩耶摩耶娑訶大洞救傾劫第十二章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見崇嶐之上男女混雜擁擠稠密凝眸共眺忽然聲震霹𩆝男女墜落者紛紛如雨夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見高阜男婦擁登怡情眺望無端聲震墜落者紛紛如雨此何故也至尊曰劫也曰何劫至尊曰此傾劫也山三百六十紀而一崩陵二百四十紀而一圯當此運會人民不知趨避乃縱意於遊觀登高以取樂時數適逢山陵崩裂在劫者從高墜下死無完形彙聚一方焉有遺類夜光請曰敢問此劫可以救否至尊曰可哉吾當敕土宮鎮星黃老用尊邦劍左右指揮安鎮山陵使敦艮止保護人民永免傾頺於是至尊隨演大洞章曰玄會統太巖青峰周數五混合無瑕疵上下其安堵神劒按八方拜手龜靈母空洞寂無中自有霓裳舞陽室籲黃元陰房接神武至尊既説洞章已又宣祕咒曰移婆移婆怛哆囉密哆囉薩唎薩唎木梨阿陀四寧靜五嵯峨唵婆娑唵婆娑大洞救覆劫第十三章至尊咒畢旋喚夜光玉女曰汝己識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見瓊樓畫閣外郭內城墻垣聳峙奔走者往來其間突見黑氣上沖傾聲如吼墻垣自上而下往來此地者不分玉石俱在壓覆之下夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見城郭樓閣墻垣聳峙乃爾一旦傾圯使行道人民盡被壓擊掩沒此何故也至尊曰劫也曰何劫至尊曰此覆劫也物之成敗有數山嶽且有傾頺墻垣焉能永固墻垣傾圯不皆殺人緣數當其會此一種男婦應遭地滅如有所驅遂無以免夜光請曰敢問此劫可以救否至尊曰可哉吾當敕木宮靑靈蒼老樹大生幡以振起之使辱首泥塗者超提中界蟬脫塵埃於是至尊隨演大洞章曰天門自有路地戶不常扃入者濁非濁出者淸自清須延五雲景靜觀七辰靈明魔洞上界回風照紫庭太平有春色瑤光耀九星至尊既説洞章已又宣祕咒曰彌婆彌婆𡁮口難𡁮囉嚕蘇葛怛哆嚕蘇葛怛哆吽叱吽三盤陀唵沙恆河大洞救轟劫第十四章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見敵人樹壘旗鼓相當從軍兵辨或操矛戟或執干戈方在賈勇前驅陡忽震響若雷一時甲胄之士應聲羣倒焦頭爛額甚者幾成灰燼夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見兩軍相對正在逞比干戈揚威耀武一旦聲發如雷兵辨應聲傾倒輕者焦爛重者灰燼此何故也至尊曰劫也曰何劫至尊曰此轟劫也上古少此兵術秦漢而後談兵者多重火攻於是乎有炮鎗火藥發無不中中無不多惟此兵辨宿業過深應當此禍數逢其值無所逃避夜光請曰敢問此劫可以救否至尊曰可哉吾當敕金宮皓靈白老挹瑤池水以洗濯沉魂淸涼世界使四裔來王國土安寧兵辨樂豫於是至尊隨演大洞章曰陽曦光自溫明魔不可淪大道洞垂文宥彼高元曾淸涼乃樂地慈悲是顯門朱顏一重生億萬有完人西方覘素景海宇絶塵氛至尊既説洞章已又宣祕咒曰達納達納無方覺有方覺吧𡄣噠吧𡄣噠唵吽哩喇嘛唎叭嗎唎叭大洞救獸劫第十五章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見塵土居民五體不具全失人形或身倒巖穴或尸橫邱壑旁有豹虎犀豺之屬悉皆張頤舞爪猙獰還向腥羶厲氣不可近鼻夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見猛獸爪牙環山遍野貌則猙獰聲則震裂更有民人尸迹堆填穴壑或則餘髮僅存或則枯骨壘見而形體不全者尤自多多此何故也至尊曰劫也曰何劫至尊曰此獸劫也天下害人之獸俱付守山神祗當坊土社糾察約束自塵劫將興而百獸不聽約制始則充滿山林繼則橫行城郭吞噬之毒可以一家可以一邑凡宿業深者俱不能免此荼毒夜光請曰敢問此劫可以救否至尊曰可哉吾當敕東南好生度命慈者出巽戶以和風解之使凶獸各體慈悲履尾不嘻母致弱肉強食於是至尊隨演大洞章曰天皇普大願百族不鴟張一聽人角逐斂息謹閉藏五嶽威呵護四瀆鎮門堂無妄不驚貜俯首任軒昂空洞法中法一回煞天罡至尊既説洞章已又宣祕咒曰辣祼辣祼淸涼地無平陂阿那婆移那婆甕雨羊含撇都囉巴都囉唵吽娑訶摩娑訶大洞救蟲劫第十六章至尊咒畢旋喚夜光玉女曰汝已識此一劫尚其乘吾光登臺而更照之夜光承諭又復登臺照見鱗蟲之族奇蛇異蟒虺蠍蜈蚣等類或以口吞人或以身束人或以尾擊人人民受害者或全體盡沒或身體半存或髮膚僅留其迹或不死猶抱其傷夜光注視良久罔可測識隨詣天寶几前俯伏奏曰奉敕往觀所見俗民小居體相破爛無復全人或面靑色紫或腹大肌裂或則身存其半或則口鼻鮮血而百蟲圍繞競作噬嚙之狀此何故也至尊曰劫也曰何劫至尊曰此蟲劫也毒蟲害物不論巨細大則傷人以口小則毒人以氣或上延於嵐瘴或貽毒於溪壑塵劫會逢百蟲當道不見伏藏蠶食恣縱山川魑魅魍魎之屬亦從中以竊害夜光請曰敢問此劫可以救否至尊曰可哉吾當敕四天門王各執寶器神戈以麾蕩之使山霧不濛水波不穢一切靈蟲退藏於穴斂迹於土但有淸明無滋毒癘於是至尊隨演大洞章曰天地本淸寧民物安以泰一自狂焰生貽害無方大崑崙接太華坦蕩無妨礙注此甘露盂充周孰其外混合霄衢邈坤維一力載至尊既説洞章已又宣祕咒曰巴囉巴囉叭哪祼葛哪祼東生明西生母唵囉哩哆迦哩哆叱叱叱哆哆哆唵修圖河唵修圖河至尊咒畢旋喚夜光玉女曰吾光已收汝所疊見塵劫已盡於此其有一人一事數人數事是謂之難不在劫數之條吾當為汝宏此大願廣結良緣於是總十六劫統宣大咒曰唵吽吽吽唏哩葛怛囉哂耶蘇哩吧怛盧哂耶嘛唎穀嗒那哂耶辣唎哪怛婆哂耶叭捺叭捺薩縛薩縛納達納達哆呮哆呮口曩謨恆沙河口曩謨三盤陀口曩謨婆婆訶至尊總宣祕咒畢復告夜光玉女曰塵劫纍纍汝今得見隨見隨請懇救苦劫吾既厯宣祕咒從此塵民遇大劫會均得解脫是皆汝功善哉善哉匪伊細故夜光聞諭隨上下舞蹈揚塵謝曰天王大慈天王大聖既賡洞章又宣真咒使下民永脫苦海超劫長生賤臣何幸得遇如是良緣於是旋繞天階步虛而作頌曰天王穆皇皇無量大慈光照見九地劫使我得從傍玉几皆法雨灑遍盡淸涼人登長夀域魔孽不相當叨從施餘惠更願度仙鄉旨哉真咒寶不刋大洞章夜光揚頌既畢俯謝階下一時侍列諸天帝君亦各各序班俯伏上謝曰塵劫之苦臣等周知乃知之而不克救救之而不克全不得至尊大慈大聖焉能超出塵寰脫離纍劫今日備聆洞章更聞普咒是真宏慈至德無極無上謹當遵持代擴天恩天王曰善哉善哉汝等諸天其各各體行拯度天王隨時升入玉清夜光侍輦亦升紫霄而去諸天各就天宮元皇勒版於不驕帝境之上有緣得遇便知此經無量功德矣
